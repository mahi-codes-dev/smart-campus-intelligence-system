# render.yaml — One-click Render deployment for Smart Campus Intelligence System
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: smart-campus-intelligence
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --workers ${WEB_CONCURRENCY:-2} --threads ${GUNICORN_THREADS:-2} --timeout 120 --bind 0.0.0.0:$PORT --max-requests 1000 --max-requests-jitter 100
    healthCheckPath: /health/ready
    healthCheckInterval: 10
    initialDelaySeconds: 15
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-campus-db
          property: connectionString

      - key: DB_SSL_MODE
        value: require

      - key: FLASK_ENV
        value: production

      - key: FLASK_DEBUG
        value: "false"

      - key: STRICT_STARTUP_VALIDATION
        value: "true"

      - key: AUTH_COOKIE_SECURE
        value: "true"

      - key: TRUST_PROXY_COUNT
        value: "1"

      - key: LOG_LEVEL
        value: INFO

      # Connection pooling optimized for Render free tier (max 25 Postgres connections)
      - key: DB_POOL_MINCONN
        value: "1"

      - key: DB_POOL_MAXCONN
        value: "5"

      - key: WEB_CONCURRENCY
        value: "2"

      - key: GUNICORN_THREADS
        value: "2"

      - key: RELEASE_VERSION
        value: "render-production"

      # These are auto-generated by Render on first deploy — keep them stable after that
      - key: JWT_SECRET
        generateValue: true

      - key: SECRET_KEY
        generateValue: true

      # Optional: fill in if you want email OTP features
      - key: SMTP_USERNAME
        sync: false

      - key: SMTP_PASSWORD
        sync: false

      # Optional: fill in for AI assistant features
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: smart-campus-db
    databaseName: smart_campus_db
    user: smart_campus_user
    plan: free
    region: oregon
