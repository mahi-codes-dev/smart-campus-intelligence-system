<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

    <!-- 🔹 Sidebar -->
    <div class="sidebar">
        <h2>Smart Campus</h2>
        <ul>
            <li class="active">Dashboard</li>
            <li>Students</li>
            <li>Analytics</li>
        </ul>
    </div>

    <!-- 🔹 Main Content -->
    <div class="main">

        <!-- Navbar -->
        <div class="topbar">
            <span>Welcome, <span id="userEmail"></span></span>
            <button onclick="logout()">Logout</button>
        </div>

        <!-- Dashboard -->
        <div class="dashboard-container">

            <h1>Dashboard</h1>

            <div class="grid">

                <div class="card highlight">
                    <h3>Readiness Score</h3>
                    <p id="readinessScore"></p>
                </div>

                <div class="card">
                    <h3>Status</h3>
                    <p id="status"></p>
                </div>

                <div class="card">
                    <h3>Risk Level</h3>
                    <p id="risk"></p>
                </div>

            </div>

            <div class="card leaderboard">
                <h2>Top Students</h2>
                <ul id="topStudents"></ul>
            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
    loadDashboard();
</script>

</body>
</html>
