<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Smart Campus</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #0f766e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 35%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(520px, 100%);
            background: var(--card);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 8px;
            color: white;
            background: var(--accent);
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>You're offline</h1>
        <p>Smart Campus can still show some cached pages, but live academic data needs a network connection.</p>
        <p>Reconnect to continue using dashboards, notifications, and write actions.</p>
        <a href="/">Try again</a>
    </main>
</body>
</html>
