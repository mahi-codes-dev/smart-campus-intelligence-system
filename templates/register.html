{% extends "base_auth.html" %}

{% block title %}Register - Smart Campus Intelligence{% endblock %}

{% block content %}
<div class="auth-header" style="margin-bottom: 30px;">
    <div class="header-badge">
        <i class="fas fa-sparkles"></i>
        <span>New Journey</span>
    </div>
    <h2>Create Account</h2>
    <p>Join our intelligent academic ecosystem today.</p>
</div>

<form class="auth-form" id="registerForm">
    <!-- Name Field -->
    <div class="form-group form-group-enhanced">
        <label for="name" class="form-label">Full Name <span style="color: #ef4444;">*</span></label>
        <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
        </div>
        <span class="error-message" id="nameError"></span>
    </div>

    <!-- Email Field -->
    <div class="form-group form-group-enhanced">
        <label for="email" class="form-label">Email Address <span style="color: #ef4444;">*</span></label>
        <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@campus.edu" required>
        </div>
        <span class="error-message" id="emailError"></span>
    </div>

    <!-- Password Field -->
    <div class="form-group form-group-enhanced">
        <label for="password" class="form-label">Password <span style="color: #ef4444;">*</span></label>
        <div class="input-group">
            <i class="fas fa-key input-icon"></i>
            <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 8 characters" required>
            <i class="fas fa-eye toggle-password-btn" onclick="togglePassword(this)"></i>
        </div>
        <div class="password-strength-container" style="margin-top: 8px;">
            <div class="strength-bar" style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;">
                <div class="strength-fill" style="height: 100%; width: 0%; border-radius: 2px; transition: all 0.3s;"></div>
            </div>
            <span class="password-strength" style="font-size: 11px;"></span>
        </div>
        <span class="error-message" id="passwordError"></span>
    </div>

    <!-- Role Field -->
    <div class="form-group form-group-enhanced">
        <label for="role" class="form-label">Your Role <span style="color: #ef4444;">*</span></label>
        <div class="input-group">
            <i class="fas fa-user-tag input-icon"></i>
            <select id="role" name="role" class="form-control" required style="width: 100%; background: transparent; color: white;">
                <option value="" style="color: #0f172a;">Choose role...</option>
            </select>
        </div>
        <span class="error-message" id="roleError"></span>
    </div>

    <!-- Department Field (Conditional) -->
    <div id="departmentField" class="form-group form-group-enhanced" style="display: none;">
        <label for="department" class="form-label">Department</label>
        <div class="input-group">
            <i class="fas fa-building input-icon"></i>
            <select id="department" name="department" class="form-control" style="width: 100%; background: transparent; color: white;">
                <option value="" style="color: #0f172a;">Select department</option>
            </select>
        </div>
        <span class="error-message" id="departmentError"></span>
    </div>

    <!-- Roll Number Field (Conditional) -->
    <div id="rollNumberField" class="form-group form-group-enhanced" style="display: none;">
        <label for="rollNumber" class="form-label">Roll Number</label>
        <div class="input-group">
            <i class="fas fa-id-card input-icon"></i>
            <input type="text" id="rollNumber" name="rollNumber" class="form-control" placeholder="e.g., CSE2024001">
        </div>
        <span class="error-message" id="rollNumberError"></span>
    </div>

    <button type="button" onclick="register()" class="btn btn-primary btn-block btn-lg btn-enhanced" style="margin-top: 20px;">
        <span>Create Account</span>
        <i class="fas fa-user-plus"></i>
    </button>

    <div class="message-container">
        <p id="message" class="message"></p>
    </div>

    <div class="auth-divider" style="display: flex; align-items: center; text-align: center; margin: 25px 0; color: #64748b; font-size: 14px;">
        <span style="padding: 0 10px;">Already have an account?</span>
    </div>

    <a href="/" class="btn btn-secondary btn-block btn-enhanced">
        Sign In
    </a>
</form>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script>
    // Password strength logic
    document.getElementById('password').addEventListener('input', function() {
        const strength = document.querySelector('.password-strength');
        const fill = document.querySelector('.strength-fill');
        const val = this.value;
        
        if (!val) {
            strength.textContent = '';
            fill.style.width = '0%';
            return;
        }
        
        let score = 0;
        if (val.length >= 8) score++;
        if (/[a-z]/.test(val) && /[A-Z]/.test(val)) score++;
        if (/\d/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#06b6d4'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];
        
        fill.style.width = (score / 4 * 100) + '%';
        fill.style.background = colors[score-1] || '#ef4444';
        strength.textContent = labels[score-1] || 'Very Weak';
        strength.style.color = colors[score-1] || '#ef4444';
    });
</script>
{% endblock %}
