<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Campus Intelligence System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-split">
        <!-- Left side - Branding -->
        <div class="auth-branding">
            <div class="branding-content">
                <div class="branding-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Smart Campus</h1>
                <p>Intelligence System</p>
                <div class="branding-features">
                    <div class="feature">
                        <i class="fas fa-book"></i>
                        <span>Learn & Grow</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-star"></i>
                        <span>Track Progress</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-lock"></i>
                        <span>Your Privacy Matters</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side - Registration Form -->
        <div class="auth-form-wrapper">
            <div class="auth-card register-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join Smart Campus and start your journey</p>
                </div>

                <form class="auth-form" id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input 
                                    type="text" 
                                    id="name" 
                                    name="name"
                                    placeholder="John Doe"
                                    required
                                >
                            </div>
                            <span class="error-message" id="nameError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email"
                                    placeholder="you@example.com"
                                    required
                                >
                            </div>
                            <span class="error-message" id="emailError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password"
                                    placeholder="Create a strong password"
                                    required
                                >
                                <i class="fas fa-eye toggle-password" onclick="togglePassword(this)"></i>
                            </div>
                            <span class="password-strength"></span>
                            <span class="error-message" id="passwordError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="role">Select Role</label>
                            <div class="input-wrapper">
                                <i class="fas fa-graduation-cap"></i>
                                <select id="role" name="role" required>
                                    <option value="">Choose your role...</option>
                                </select>
                            </div>
                            <span class="error-message" id="roleError"></span>
                        </div>
                    </div>

                    <div id="departmentField" class="form-row" style="display: none;">
                        <div class="form-group">
                            <label for="department">Department</label>
                            <div class="input-wrapper">
                                <i class="fas fa-building"></i>
                                <input 
                                    type="text" 
                                    id="department" 
                                    name="department"
                                    placeholder="e.g., Computer Science"
                                >
                            </div>
                            <span class="error-message" id="departmentError"></span>
                        </div>
                    </div>

                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                    </label>
                    <span class="error-message" id="termsError"></span>

                    <button type="button" onclick="register()" class="btn btn-primary btn-block">
                        <span>Create Account</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="message-container">
                        <p id="message" class="message"></p>
                    </div>
                </form>

                <div class="auth-divider">
                    <span>Already a member?</span>
                </div>

                <a href="/" class="btn btn-secondary btn-block">
                    <span>Sign In</span>
                    <i class="fas fa-sign-in-alt"></i>
                </a>

                <div class="auth-footer">
                    <p>Need help? <a href="#">Contact Support</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='shared.js') }}"></script>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script>
    loadRegistrationForm();
    
    // Show/hide department field based on role
    document.getElementById('role').addEventListener('change', function() {
        const departmentField = document.getElementById('departmentField');
        if (this.value === 'faculty' || this.value === 'admin') {
            departmentField.style.display = 'block';
        } else {
            departmentField.style.display = 'none';
        }
    });

    // Password strength indicator
    document.getElementById('password').addEventListener('input', function() {
        const strength = document.querySelector('.password-strength');
        const value = this.value;
        
        if (value.length === 0) {
            strength.textContent = '';
            strength.className = 'password-strength';
            return;
        }
        
        let score = 0;
        if (value.length >= 8) score++;
        if (/[a-z]/.test(value) && /[A-Z]/.test(value)) score++;
        if (/\d/.test(value)) score++;
        if (/[^a-zA-Z\d]/.test(value)) score++;
        
        const strengths = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
        const classes = ['', 'weak', 'fair', 'good', 'strong'];
        
        strength.textContent = 'Strength: ' + strengths[score];
        strength.className = 'password-strength ' + classes[score];
    });
</script>

</body>
</html>
